name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[test]"
          pip install pip-audit

      - name: Run tests
        run: |
          pytest -v --cov=sounding --cov-report=xml --cov-fail-under=65 -k "not (web_target or port_check_open or port_check_closed or port_scan_small or http_check or whois or traceroute)"
        env:
          SOUNDING_SKIP_DOCKER: "1"

      - name: Security audit
        run: |
          pip-audit

      - name: Leakage scan
        run: |
          ! grep -ri "charlieseay\|seaynicroute\|192\.168\.0" src/ || (echo "LEAK DETECTED" && exit 1)
